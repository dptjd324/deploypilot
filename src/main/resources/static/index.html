<!doctype html>
<html lang="ko">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>DeployPilot</title>
	<style>
		:root {
			color-scheme: light;
			--bg: #f5f7fb;
			--panel: #ffffff;
			--line: #d8dee9;
			--text: #172033;
			--muted: #657084;
			--accent: #0f766e;
			--accent-dark: #115e59;
			--danger: #b42318;
			--shadow: 0 8px 24px rgba(23, 32, 51, 0.08);
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			background: var(--bg);
			color: var(--text);
			font-family: Arial, "Noto Sans KR", sans-serif;
			letter-spacing: 0;
		}

		header {
			background: var(--panel);
			border-bottom: 1px solid var(--line);
		}

		.header-inner,
		main {
			width: min(1120px, calc(100% - 32px));
			margin: 0 auto;
		}

		.header-inner {
			display: flex;
			align-items: center;
			justify-content: space-between;
			min-height: 72px;
			gap: 20px;
		}

		.brand {
			display: flex;
			flex-direction: column;
			gap: 4px;
		}

		h1 {
			margin: 0;
			font-size: 24px;
			font-weight: 700;
		}

		.subtitle {
			margin: 0;
			color: var(--muted);
			font-size: 14px;
		}

		main {
			padding: 28px 0 44px;
		}

		.toolbar {
			display: grid;
			grid-template-columns: repeat(2, minmax(220px, 1fr)) auto;
			align-items: end;
			gap: 12px;
			margin-bottom: 20px;
		}

		label {
			display: flex;
			flex-direction: column;
			gap: 7px;
			color: var(--muted);
			font-size: 13px;
			font-weight: 700;
		}

		input {
			width: 100%;
			min-height: 42px;
			border: 1px solid var(--line);
			border-radius: 6px;
			padding: 8px 10px;
			color: var(--text);
			background: var(--panel);
			font: inherit;
		}

		button {
			min-height: 42px;
			border: 0;
			border-radius: 6px;
			padding: 0 18px;
			background: var(--accent);
			color: #ffffff;
			font: inherit;
			font-weight: 700;
			cursor: pointer;
		}

		button:hover {
			background: var(--accent-dark);
		}

		button:disabled {
			cursor: wait;
			opacity: 0.7;
		}

		.status {
			min-height: 22px;
			margin: 0 0 16px;
			color: var(--muted);
			font-size: 14px;
		}

		.status.error {
			color: var(--danger);
			font-weight: 700;
		}

		.metric-grid {
			display: grid;
			grid-template-columns: repeat(4, minmax(0, 1fr));
			gap: 14px;
		}

		.metric {
			min-height: 148px;
			padding: 18px;
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: 8px;
			box-shadow: var(--shadow);
			display: flex;
			flex-direction: column;
			justify-content: space-between;
		}

		.metric-title {
			margin: 0;
			color: var(--muted);
			font-size: 13px;
			font-weight: 700;
		}

		.metric-value {
			margin: 16px 0 0;
			font-size: 32px;
			font-weight: 800;
			line-height: 1.05;
			overflow-wrap: anywhere;
		}

		.metric-unit {
			margin: 8px 0 0;
			color: var(--muted);
			font-size: 13px;
		}

		.detail {
			margin-top: 18px;
			background: var(--panel);
			border: 1px solid var(--line);
			border-radius: 8px;
			padding: 16px 18px;
			color: var(--muted);
			font-size: 14px;
			display: flex;
			justify-content: space-between;
			gap: 12px;
			flex-wrap: wrap;
		}

		@media (max-width: 900px) {
			.metric-grid {
				grid-template-columns: repeat(2, minmax(0, 1fr));
			}
		}

		@media (max-width: 680px) {
			.header-inner {
				align-items: flex-start;
				flex-direction: column;
				justify-content: center;
				padding: 14px 0;
			}

			.toolbar {
				grid-template-columns: 1fr;
			}

			.metric-grid {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
<header>
	<div class="header-inner">
		<div class="brand">
			<h1>DeployPilot</h1>
			<p class="subtitle">Release quality and DORA dashboard</p>
		</div>
	</div>
</header>
<main>
	<form class="toolbar" id="dashboardForm">
		<label>
			From
			<input id="fromInput" type="datetime-local" required>
		</label>
		<label>
			To
			<input id="toInput" type="datetime-local" required>
		</label>
		<button id="loadButton" type="submit">조회</button>
	</form>

	<p class="status" id="statusText">기간을 선택하면 DORA 지표를 조회합니다.</p>

	<section class="metric-grid" aria-label="DORA metrics">
		<article class="metric">
			<p class="metric-title">Deployment Frequency</p>
			<p class="metric-value" id="deploymentFrequency">0</p>
			<p class="metric-unit">deployments</p>
		</article>
		<article class="metric">
			<p class="metric-title">Lead Time for Changes</p>
			<p class="metric-value" id="averageLeadTimeMinutes">0</p>
			<p class="metric-unit">minutes</p>
		</article>
		<article class="metric">
			<p class="metric-title">Change Failure Rate</p>
			<p class="metric-value" id="changeFailureRate">0.00</p>
			<p class="metric-unit">percent</p>
		</article>
		<article class="metric">
			<p class="metric-title">Recovery Time</p>
			<p class="metric-value" id="averageFailedDeploymentRecoveryTimeMinutes">0</p>
			<p class="metric-unit">minutes</p>
		</article>
	</section>

	<section class="detail" aria-label="Selected period">
		<span id="periodFrom">From: -</span>
		<span id="periodTo">To: -</span>
	</section>
</main>
<script>
	const form = document.getElementById("dashboardForm");
	const fromInput = document.getElementById("fromInput");
	const toInput = document.getElementById("toInput");
	const loadButton = document.getElementById("loadButton");
	const statusText = document.getElementById("statusText");

	const fields = {
		deploymentFrequency: document.getElementById("deploymentFrequency"),
		averageLeadTimeMinutes: document.getElementById("averageLeadTimeMinutes"),
		changeFailureRate: document.getElementById("changeFailureRate"),
		averageFailedDeploymentRecoveryTimeMinutes: document.getElementById("averageFailedDeploymentRecoveryTimeMinutes"),
		periodFrom: document.getElementById("periodFrom"),
		periodTo: document.getElementById("periodTo")
	};

	function toInputValue(date) {
		const offset = date.getTimezoneOffset();
		const local = new Date(date.getTime() - offset * 60000);
		return local.toISOString().slice(0, 16);
	}

	function toApiDateTime(value) {
		return value.length === 16 ? `${value}:00` : value;
	}

	function setDefaultRange() {
		const to = new Date();
		const from = new Date(to);
		from.setDate(from.getDate() - 30);
		from.setHours(0, 0, 0, 0);
		to.setSeconds(0, 0);
		fromInput.value = toInputValue(from);
		toInput.value = toInputValue(to);
	}

	function setStatus(message, error = false) {
		statusText.textContent = message;
		statusText.classList.toggle("error", error);
	}

	function render(data) {
		fields.deploymentFrequency.textContent = data.deploymentFrequency ?? 0;
		fields.averageLeadTimeMinutes.textContent = data.averageLeadTimeMinutes ?? 0;
		fields.changeFailureRate.textContent = Number(data.changeFailureRate ?? 0).toFixed(2);
		fields.averageFailedDeploymentRecoveryTimeMinutes.textContent =
			data.averageFailedDeploymentRecoveryTimeMinutes ?? 0;
		fields.periodFrom.textContent = `From: ${data.from ?? "-"}`;
		fields.periodTo.textContent = `To: ${data.to ?? "-"}`;
	}

	async function loadDashboard() {
		const from = toApiDateTime(fromInput.value);
		const to = toApiDateTime(toInput.value);
		loadButton.disabled = true;
		setStatus("조회 중입니다.");

		try {
			const response = await fetch(`/api/dashboard/dora?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);
			if (!response.ok) {
				throw new Error(`HTTP ${response.status}`);
			}
			const data = await response.json();
			render(data);
			setStatus("DORA 지표를 불러왔습니다.");
		} catch (error) {
			setStatus(`조회 실패: ${error.message}`, true);
		} finally {
			loadButton.disabled = false;
		}
	}

	form.addEventListener("submit", event => {
		event.preventDefault();
		loadDashboard();
	});

	setDefaultRange();
	loadDashboard();
</script>
</body>
</html>
